{% extends 'base.html' %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background-color: #121826;
        font-family: Arial, sans-serif;
    }
    .profile-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .profile-container {
        width: 90%;
        max-width: 900px;
        background-color: #1a202c;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        color: #f7fafc;
        overflow: hidden;
        display: flex;
        align-items: center;
        gap: 40px;
        padding: 40px;
    }
    .profile-image-section {
        flex: 0 0 220px;
        text-align: center;
    }
    .profile-img-wrapper {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid #3182ce;
        margin: 0 auto 15px;
        background-color: #2d3748;
    }
    .profile-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .upload-btn {
        background-color: #3182ce;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: 0.3s;
    }
    .upload-btn:hover {
        background-color: #2b6cb0;
    }
    #id_profile_picture {
        display: none;
    }
    .profile-info-section {
        flex: 1;
    }
    .profile-header {
        margin-bottom: 25px;
        border-bottom: 1px solid #2d3748;
        padding-bottom: 15px;
        text-align: center;
    }
    .profile-header h2 {
        font-size: 26px;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .form-group {
        flex: 1;
    }
    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        color: #a0aec0;
    }
    .form-control {
        width: 100%;
        padding: 12px 15px;
        background-color: #2d3748;
        border: 1px solid #4a5568;
        border-radius: 6px;
        color: #f7fafc;
        font-size: 15px;
    }
    .form-control:read-only {
        opacity: 0.8;
        cursor: not-allowed;
    }
    textarea.form-control {
        resize: none;
        height: 80px;
    }
    .btn-action {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }
    .btn-edit {
        background-color: #3182ce;
        color: white;
    }
    .btn-edit:hover {
        background-color: #2b6cb0;
    }
    .btn-save {
        background-color: #2f855a;
        color: white;
        display: none;
    }
    .btn-save:hover {
        background-color: #276749;
    }
</style>

<div class="profile-wrapper">
    <div class="profile-container">
        <!-- LEFT: PROFILE IMAGE -->
        <div class="profile-image-section">
            <div class="profile-img-wrapper">
                {% if profile.profile_picture %}
                    <img id="profileImg" src="{{ profile.profile_picture.url }}" alt="Profile Picture">
                {% else %}
                    <img id="profileImg" src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png" alt="Default Profile">
                {% endif %}
            </div>
            <label for="id_profile_picture" class="upload-btn">Change Photo</label>
        </div>

        <!-- RIGHT: PROFILE FORM -->
        <div class="profile-info-section">
            <div class="profile-header">
                <h2>👤 My Profile</h2>
            </div>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" name="last_name" value="{{ user.last_name }}" readonly>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" name="email" value="{{ user.email }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <!-- ✅ TAMA NA ANG BABASA DITO -->
                        <input type="text" class="form-control" name="phone" value="{{ profile.phone|default:'' }}" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Complete Address</label>
                    <!-- ✅ TAMA NA ANG BABASA DITO -->
                    <textarea class="form-control" name="address" readonly>{{ profile.address|default:'' }}</textarea>
                </div>

                <input type="file" name="profile_picture" id="id_profile_picture" accept="image/*" onchange="previewImage(event)">

                <button type="button" class="btn-action btn-edit" onclick="enableEdit()">Edit Profile</button>
                <button type="submit" class="btn-action btn-save" id="saveBtn">Save Changes</button>
            </form>
        </div>
    </div>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('profileImg').src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}

function enableEdit() {
    document.querySelectorAll('.form-control').forEach(el => {
        el.removeAttribute('readonly');
        el.style.borderColor = '#3182ce';
    });
    document.querySelector('.btn-edit').style.display = 'none';
    document.getElementById('saveBtn').style.display = 'block';
}
</script>
{% endblock %}
