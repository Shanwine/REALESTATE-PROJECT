{% extends 'base.html' %}
{% block title %}Send Inquiry{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="form-card fade-in">
                <h3 class="mb-1"><i class="bi bi-envelope text-accent me-2"></i>Send Inquiry</h3>
                {% if property %}<p style="color:var(--text-muted);">About: <strong>{{ property.title }}</strong></p>{% endif %}
                <hr style="border-color:var(--border);">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-gold"><i class="bi bi-send me-1"></i>Send Inquiry</button>
                    {% if property %}<a href="{% url 'property_detail' property.pk %}" class="btn btn-outline-gold ms-2">Cancel</a>{% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
